<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genera Clientes con Google | SEO Local & Páginas Web</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --orange: oklch(68% 0.22 45);
    --orange-dim: oklch(60% 0.22 45);
    --lime: oklch(76% 0.22 135);
    --dark: oklch(10% 0.02 265);
    --dark2: oklch(14% 0.02 265);
    --dark3: oklch(18% 0.025 265);
    --white: oklch(98% 0.005 80);
    --gray: oklch(55% 0.01 265);
    --light-gray: oklch(93% 0.005 265);
    --font-display: 'Syne', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--dark);
    color: var(--white);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .orange { color: var(--orange); }
  .lime { color: var(--lime); }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 18px 40px;
    display: flex; align-items: center; justify-content: space-between;
    transition: background 0.3s, backdrop-filter 0.3s;
  }
  nav.scrolled {
    background: rgba(10,10,18,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .nav-logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1.25rem;
    letter-spacing: -0.02em;
  }
  .nav-logo span { color: var(--orange); }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a {
    color: oklch(80% 0.01 265);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-cta {
    background: var(--orange);
    color: var(--dark);
    border: none;
    padding: 10px 22px;
    border-radius: 100px;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 0.875rem;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
  }
  .nav-cta:hover { opacity: 0.88; transform: scale(1.03); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; align-items: center;
    position: relative;
    overflow: hidden;
    padding: 120px 40px 80px;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 60% 40%, oklch(18% 0.06 265), transparent),
                radial-gradient(ellipse 40% 40% at 80% 80%, oklch(12% 0.04 45), transparent),
                var(--dark);
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
  }
  .hero-content {
    position: relative; z-index: 2;
    max-width: 1200px; margin: 0 auto; width: 100%;
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 0.8rem;
    font-weight: 500;
    margin-bottom: 24px;
    color: oklch(85% 0.01 265);
  }
  .hero-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--lime); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
  .hero-headline {
    font-family: var(--font-display);
    font-size: clamp(2.4rem, 5vw, 4rem);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -0.03em;
    margin-bottom: 20px;
    text-wrap: balance;
  }
  .hero-headline .highlight {
    background: linear-gradient(90deg, var(--orange), oklch(75% 0.22 60));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-sub {
    font-size: 1.15rem;
    color: oklch(72% 0.015 265);
    line-height: 1.6;
    margin-bottom: 28px;
    font-weight: 400;
  }
  .dynamic-text-wrap {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-left: 3px solid var(--lime);
    padding: 12px 18px;
    border-radius: 8px;
    margin-bottom: 36px;
    font-size: 0.95rem;
    color: oklch(78% 0.015 265);
    min-height: 52px;
  }
  .dynamic-text-wrap strong { color: var(--lime); }
  .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 40px; }
  .btn-primary {
    background: var(--orange);
    color: var(--dark);
    border: none;
    padding: 14px 28px;
    border-radius: 100px;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px oklch(68% 0.22 45 / 0.4); }
  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: var(--white);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 14px 28px;
    border-radius: 100px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.13); }
  .price-pills { display: flex; gap: 16px; flex-wrap: wrap; }
  .price-pill {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 12px 18px;
    border-radius: 12px;
  }
  .price-pill .old { text-decoration: line-through; color: var(--gray); font-size: 0.8rem; }
  .price-pill .new { font-family: var(--font-display); font-weight: 800; font-size: 1.4rem; color: var(--lime); }
  .price-pill .label { font-size: 0.75rem; color: oklch(65% 0.01 265); margin-top: 2px; }
  .hero-right { position: relative; }
  .counter-card {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .counter-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--orange), var(--lime));
  }
  .counter-number {
    font-family: var(--font-display);
    font-size: clamp(3.5rem, 8vw, 6rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--orange), var(--lime));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .counter-label { font-size: 1rem; color: oklch(70% 0.015 265); margin-top: 8px; }
  .floating-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px;
  }
  .stat-card {
    background: var(--dark3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .num {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1.6rem;
    color: var(--orange);
  }
  .stat-card .txt { font-size: 0.75rem; color: var(--gray); margin-top: 2px; }
  .star-row { color: var(--orange); font-size: 1.1rem; margin-bottom: 6px; }
  .google-badge {
    display: flex; align-items: center; gap: 10px;
    background: var(--dark3);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 14px 18px;
    margin-top: 12px;
    font-size: 0.85rem;
    color: oklch(75% 0.01 265);
  }
  .g-icon { font-size: 1.2rem; }

  /* SECTION SHARED */
  section { position: relative; }
  .section-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
  .section-label {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--orange);
    margin-bottom: 14px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.025em;
    text-wrap: balance;
  }

  /* PROBLEM */
  .problem-section { background: var(--white); color: var(--dark); padding: 100px 0; }
  .problem-section .section-label { color: var(--orange-dim); }
  .problem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; margin-top: 60px; }
  .problem-item {
    display: flex; gap: 18px; align-items: flex-start;
    padding: 28px;
    border-radius: 16px;
    border: 1px solid var(--light-gray);
    background: oklch(99% 0.003 265);
    transition: transform 0.3s, box-shadow 0.3s;
    opacity: 0; transform: translateY(24px);
  }
  .problem-item.visible { opacity: 1; transform: translateY(0); transition: opacity 0.5s, transform 0.5s; }
  .problem-item:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.08); }
  .problem-icon {
    width: 48px; height: 48px; border-radius: 12px;
    background: oklch(95% 0.01 45);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; flex-shrink: 0;
  }
  .problem-item h3 { font-family: var(--font-display); font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
  .problem-item p { font-size: 0.9rem; color: oklch(45% 0.01 265); line-height: 1.5; }
  .story-card {
    background: linear-gradient(135deg, oklch(14% 0.03 265), oklch(18% 0.04 265));
    color: var(--white);
    padding: 32px;
    border-radius: 20px;
    margin-top: 40px;
    border: 1px solid rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
  }
  .story-card::before {
    content: '"';
    position: absolute; top: -20px; right: 20px;
    font-size: 10rem;
    font-family: var(--font-display);
    font-weight: 800;
    opacity: 0.06;
    color: var(--orange);
    line-height: 1;
  }
  .story-card p { font-size: 1.05rem; line-height: 1.6; color: oklch(82% 0.01 265); }
  .story-card p strong { color: var(--orange); }
  .story-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .story-btn {
    padding: 6px 14px; border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent; color: oklch(65% 0.01 265);
    font-size: 0.8rem; cursor: pointer; font-family: var(--font-body);
    transition: all 0.2s;
  }
  .story-btn.active { background: var(--orange); color: var(--dark); border-color: var(--orange); font-weight: 700; }

  /* SOLUTION */
  .solution-section { background: var(--dark); padding: 100px 0; }
  .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-top: 60px; }
  .product-card {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px;
    padding: 40px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
  }
  .product-card:hover { transform: translateY(-6px); }
  .product-card.featured { border-color: rgba(255,255,255,0.15); }
  .product-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .product-card.seo::before { background: linear-gradient(90deg, var(--lime), oklch(72% 0.2 180)); }
  .product-card.web::before { background: linear-gradient(90deg, var(--orange), oklch(72% 0.2 60)); }
  .product-tag {
    display: inline-block;
    padding: 5px 12px; border-radius: 100px;
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 18px;
  }
  .product-tag.seo { background: oklch(76% 0.22 135 / 0.15); color: var(--lime); }
  .product-tag.web { background: oklch(68% 0.22 45 / 0.15); color: var(--orange); }
  .product-name {
    font-family: var(--font-display);
    font-size: 1.6rem; font-weight: 800;
    line-height: 1.2; margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .product-desc { font-size: 0.92rem; color: oklch(65% 0.01 265); margin-bottom: 28px; line-height: 1.6; }
  .features-list { list-style: none; margin-bottom: 32px; display: flex; flex-direction: column; gap: 10px; }
  .features-list li {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 0.88rem; color: oklch(78% 0.01 265);
  }
  .features-list li .check {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; flex-shrink: 0; margin-top: 1px;
  }
  .check.seo { background: oklch(76% 0.22 135 / 0.15); color: var(--lime); }
  .check.web { background: oklch(68% 0.22 45 / 0.15); color: var(--orange); }
  .product-price { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 20px; }
  .old-price { text-decoration: line-through; color: var(--gray); font-size: 1rem; align-self: center; }
  .new-price {
    font-family: var(--font-display);
    font-size: 2.4rem; font-weight: 800; line-height: 1;
  }
  .new-price.seo { color: var(--lime); }
  .new-price.web { color: var(--orange); }
  .price-period { color: oklch(55% 0.01 265); font-size: 0.85rem; align-self: flex-end; margin-bottom: 6px; }
  .btn-product {
    width: 100%; padding: 15px;
    border-radius: 100px; border: none;
    font-family: var(--font-body); font-weight: 700; font-size: 1rem;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-product.seo {
    background: var(--lime); color: var(--dark);
  }
  .btn-product.seo:hover { transform: translateY(-2px); box-shadow: 0 12px 40px oklch(76% 0.22 135 / 0.4); }
  .btn-product.web {
    background: var(--orange); color: var(--dark);
  }
  .btn-product.web:hover { transform: translateY(-2px); box-shadow: 0 12px 40px oklch(68% 0.22 45 / 0.4); }

  /* SOCIAL PROOF */
  .proof-section { background: oklch(97% 0.005 265); color: var(--dark); padding: 100px 0; }
  .proof-section .section-label { color: var(--orange-dim); }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin: 50px 0; }
  .big-stat {
    text-align: center; padding: 28px;
    background: var(--white);
    border-radius: 16px;
    border: 1px solid oklch(90% 0.005 265);
  }
  .big-stat .n {
    font-family: var(--font-display);
    font-size: 2.8rem; font-weight: 800;
    background: linear-gradient(135deg, var(--orange), oklch(72% 0.2 60));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .big-stat .t { font-size: 0.85rem; color: oklch(45% 0.01 265); margin-top: 4px; }
  .testimonials-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .testimonial {
    background: var(--white);
    border: 1px solid oklch(90% 0.005 265);
    border-radius: 16px;
    padding: 28px;
    opacity: 0; transform: translateY(20px);
  }
  .testimonial.visible { opacity: 1; transform: none; transition: all 0.5s; }
  .test-stars { color: #f59e0b; font-size: 0.9rem; margin-bottom: 12px; }
  .test-text { font-size: 0.9rem; line-height: 1.6; color: oklch(35% 0.01 265); margin-bottom: 16px; }
  .test-author { display: flex; align-items: center; gap: 12px; }
  .test-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--orange), var(--lime));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.9rem; color: var(--dark);
  }
  .test-name { font-weight: 700; font-size: 0.9rem; }
  .test-biz { font-size: 0.78rem; color: var(--gray); }

  /* HOW IT WORKS */
  .how-section { background: var(--dark2); padding: 100px 0; }
  .steps-timeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin-top: 60px; position: relative; }
  .steps-timeline::before {
    content: ''; position: absolute;
    top: 36px; left: 12.5%; right: 12.5%;
    height: 2px;
    background: linear-gradient(90deg, var(--orange), var(--lime));
  }
  .step { text-align: center; padding: 0 20px; }
  .step-num {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--dark3);
    border: 2px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    font-family: var(--font-display);
    font-size: 1.5rem; font-weight: 800;
    position: relative; z-index: 2;
    transition: all 0.3s;
  }
  .step:hover .step-num {
    border-color: var(--orange);
    box-shadow: 0 0 30px oklch(68% 0.22 45 / 0.3);
    color: var(--orange);
  }
  .step h3 { font-family: var(--font-display); font-weight: 700; font-size: 1.05rem; margin-bottom: 10px; }
  .step p { font-size: 0.85rem; color: oklch(60% 0.01 265); line-height: 1.5; }

  /* SECTOR SECTION */
  .sector-section { background: var(--dark); padding: 100px 0; }
  .sector-tabs { display: flex; gap: 12px; flex-wrap: wrap; margin: 40px 0 32px; }
  .sector-tab {
    padding: 10px 20px; border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent; color: oklch(65% 0.01 265);
    font-size: 0.88rem; cursor: pointer; font-family: var(--font-body); font-weight: 500;
    transition: all 0.2s;
  }
  .sector-tab.active { background: var(--orange); color: var(--dark); border-color: var(--orange); font-weight: 700; }
  .sector-content {
    display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center;
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px;
    padding: 50px;
  }
  .sector-headline {
    font-family: var(--font-display);
    font-size: 2rem; font-weight: 800;
    line-height: 1.15; letter-spacing: -0.02em;
    margin-bottom: 16px;
  }
  .sector-desc { color: oklch(65% 0.01 265); line-height: 1.7; margin-bottom: 24px; }
  .sector-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .sector-stat {
    background: var(--dark3);
    border-radius: 12px;
    padding: 18px;
  }
  .sector-stat .v {
    font-family: var(--font-display);
    font-weight: 800; font-size: 1.8rem;
    color: var(--lime);
  }
  .sector-stat .l { font-size: 0.78rem; color: var(--gray); margin-top: 4px; }
  .sector-visual {
    background: var(--dark3);
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 4/3;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    border: 1px solid rgba(255,255,255,0.05);
    position: relative;
  }
  .sector-icon { font-size: 4rem; }
  .sector-label-vis { font-size: 0.8rem; color: var(--gray); font-family: monospace; text-align: center; padding: 0 24px; }
  .search-bar-mock {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    padding: 10px 18px;
    display: flex; align-items: center; gap: 8px;
    width: 80%;
    font-size: 0.85rem; color: oklch(60% 0.01 265);
  }
  .search-result-mock {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 18px;
    width: 80%;
  }
  .srm-g { color: var(--lime); font-size: 0.7rem; font-weight: 700; margin-bottom: 2px; }

function useScrollAnim(ref) {
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {el.classList.add('visible');obs.disconnect();}
    }, { threshold: 0.15 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
}

function useCounter(target, duration = 2000) {
  const [val, setVal] = useState(0);
  const started = useRef(false);
  const ref = useRef();
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const start = Date.now();
        const tick = () => {
          const p = Math.min((Date.now() - start) / duration, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          setVal(Math.round(ease * target));
          if (p < 1) requestAnimationFrame(tick);
        };
        tick();
      }
    }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [target, duration]);
  return [val, ref];
}

  hola: ['¡Hola! 👋 Cuéntame, ¿qué tipo de negocio tienes? Te digo en segundos cuántos clientes potenciales hay en Google para ti.', null]

function Chatbot() {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([{ type: 'bot', text: '¡Hola! 👋 ¿Qué tipo de negocio tienes? Te digo cuántos clientes están buscando en Google lo que ofreces.' }]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const endRef = useRef();

  const scrollToBottom = () => {
    if (endRef.current) endRef.current.parentElement.scrollTop = endRef.current.offsetTop;
  };

  const getReply = (text) => {
    const t = text.toLowerCase();
    if (t.includes('pizza')) return BOT_REPLIES.pizza;
    if (t.includes('restaurante') || t.includes('comida')) return BOT_REPLIES.restaurante;
    if (t.includes('abogad')) return BOT_REPLIES.abogado;
    if (t.includes('doctor') || t.includes('clínica') || t.includes('medic')) return BOT_REPLIES.doctor;
    if (t.includes('precio') || t.includes('costo') || t.includes('cuánto')) return BOT_REPLIES.precio;
    if (t.includes('hola') || t.includes('buenos') || t.includes('buenas')) return BOT_REPLIES.hola;
    return ['Interesante. Para darte un diagnóstico preciso, dime: ¿en qué ciudad está tu negocio?', null];
  };

  const send = () => {
    if (!input.trim()) return;
    const userMsg = input.trim();
    setInput('');
    setMsgs((m) => [...m, { type: 'user', text: userMsg }]);
    setTyping(true);
    setTimeout(() => {
      const [reply] = getReply(userMsg);
      setMsgs((m) => [...m, { type: 'bot', text: reply }]);
      setTyping(false);
      setTimeout(scrollToBottom, 50);
    }, 900 + Math.random() * 400);
  };

  return <>
    <button className="chatbot-fab" onClick={() => setOpen((o) => !o)}>
      {open ? '✕' : '💬'}
    </button>
    {open &&
    <div className="chatbot-window">
        <div className="chat-header">
          <div className="chat-avatar">🤖</div>
          <div>
            <div className="chat-title">Asistente GeneraClientes</div>
            <div className="chat-status"><div className="chat-dot"></div> En línea ahora</div>
          </div>
        </div>
        <div className="chat-messages">
          {msgs.map((m, i) =>
        <div key={i} className={`msg ${m.type === 'bot' ? 'bot' : 'user-m'}`}>{m.text}</div>
        )}
          {typing && <div className="msg bot" style={{ color: 'var(--gray)' }}>Escribiendo...</div>}
          <div ref={endRef}></div>
        </div>
        <div className="chat-input-row">
          <input
          className="chat-input"
          placeholder="Escribe tu negocio..."
          value={input}
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => e.key === 'Enter' && send()} />
        
          <button className="chat-send" onClick={send}>→</button>
        </div>
      </div>
    }
  </>;
}

function DiagnosisTool() {
  const [query, setQuery] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  const analyze = async () => {
    if (!query.trim()) return;
    setLoading(true);
    setResult(null);

    // Use Claude to generate a realistic diagnosis
    try {
      const response = await window.claude.complete({
        messages: [{
          role: 'user',
          content: `Eres un experto en SEO local y Google Business. Un negocio te dice: "${query}". 
          Genera un diagnóstico corto y realista en español con estas métricas (inventa valores plausibles):
          - Presencia en Google (0-100)
          - Optimización del perfil (0-100)
          - Reseñas y reputación (0-100)
          - SEO local (0-100)
          - Búsquedas mensuales estimadas (número)
          - Un consejo urgente (1 frase)
          Responde SOLO en JSON válido con keys: presencia, perfil, resenas, seo, busquedas, consejo`
        }]

      let parsed;

        const jsonMatch = response.match(/\{[\s\S]*\}/);

// ── COUNTDOWN ──────────────────────────────────────────────────────────────────
function useCountdown(days) {
  const [time, setTime] = useState({ d: days, h: 23, m: 59, s: 59 });
  useEffect(() => {
    const end = Date.now() + days * 86400000 + 23 * 3600000 + 59 * 60000 + 59000;
    const tick = () => {
      const diff = end - Date.now();
      if (diff <= 0) return;
      setTime({
        d: Math.floor(diff / 86400000),
        h: Math.floor(diff % 86400000 / 3600000),
        m: Math.floor(diff % 3600000 / 60000),
        s: Math.floor(diff % 60000 / 1000)
      });
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [days]);
  return time;
}

// ── ROTATING TEXT ──────────────────────────────────────────────────────────────
function RotatingText({ items }) {
  const [idx, setIdx] = useState(0);
  const [fade, setFade] = useState(true);
  useEffect(() => {
    const id = setInterval(() => {
      setFade(false);
      setTimeout(() => {setIdx((i) => (i + 1) % items.length);setFade(true);}, 300);
    }, 2800);
    return () => clearInterval(id);
  }, [items]);
  return (
    <div className="dynamic-text-wrap">
      <span style={{ opacity: fade ? 1 : 0, transition: 'opacity 0.3s' }}>
        {items[idx]}
      </span>
    </div>);

}

            <button className="btn-product web" onClick={() => document.getElementById('cta-final').scrollIntoView()}>
              Quiero mi página web →
            </button>
          </div>
        </div>
      </div>
    </section>

    {/* SOCIAL PROOF */}
    <section className="proof-section" id="resultados">
      <div className="section-inner">
        <div className="fade-up" style={{ textAlign: 'center' }}>
          <div className="section-label">Resultados reales</div>
          <h2 className="section-title" style={{ fontFamily: "Verdana" }}>Lo que dicen los negocios<br />que ya generan clientes</h2>
        </div>
        <div className="stats-row">
          {[
          { n: '+1,200', t: 'negocios con clientes nuevos' },
          { n: '3X', t: 'clientes en promedio en 90 días' },
          { n: '4.9★', t: 'calificación de clientes' },
          { n: '30 días', t: 'a los primeros resultados' }].
          map((s, i) =>
          <div key={i} className="big-stat fade-up" style={{ transitionDelay: `${i * 0.1}s` }}>
              <div className="n">{s.n}</div>
              <div className="t">{s.t}</div>
            </div>
          )}
        </div>
        <div className="testimonials-grid">
          {testimonials.map((t, i) =>
          <div key={i} className="testimonial" style={{ transitionDelay: `${i * 0.15}s` }}>
              <div className="test-stars">{'★'.repeat(t.stars)}</div>
              <p className="test-text">"{t.text}"</p>
              <div className="test-author">
                <div className="test-avatar">{t.initials}</div>
                <div>
                  <div className="test-name">{t.name}</div>
                  <div className="test-biz">{t.biz}</div>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </section>

    {/* HOW IT WORKS */}
    <section className="how-section" id="proceso">
      <div className="section-inner">
        <div className="fade-up" style={{ textAlign: 'center' }}>
          <div className="section-label">El proceso</div>
          <h2 className="section-title">Tan simple como 4 pasos</h2>
        </div>
        <div className="steps-timeline">
          {[
          { n: '01', title: 'Analizamos tu negocio', desc: 'Estudiamos tu zona, competencia y cuántas búsquedas mensuales existen para tu giro.' },
          { n: '02', title: 'Creamos tu estrategia', desc: 'Diseñamos un plan con las palabras clave y acciones con mayor potencial de clientes para ti.' },
          { n: '03', title: 'Implementamos todo', desc: 'Optimizamos tu Google Business, creamos tu web y activamos el posicionamiento local.' },
          { n: '04', title: 'Recibes clientes', desc: 'En 30-60 días empiezas a recibir llamadas, mensajes y visitas de personas que te encontraron en Google.' }].
          map((s, i) =>
          <div key={i} className="step fade-up" style={{ transitionDelay: `${i * 0.12}s` }}>
              <div className="step-num">{s.n}</div>
              <h3>{s.title}</h3>
              <p>{s.desc}</p>
            </div>
          )}
        </div>
      </div>
    </section>

    {/* SECTOR */}
    <section className="sector-section">
      <div className="section-inner">
        <div className="fade-up">
          <div className="section-label">Por tipo de negocio</div>
          <h2 className="section-title" style={{ fontFamily: "Verdana" }}>¿Cuántos clientes potenciales<br />hay en Google para ti?</h2>
        </div>
        <div className="sector-tabs">
          {Object.keys(sectors).map((k) =>
          <button key={k} className={`sector-tab ${activeSector === k ? 'active' : ''}`} onClick={() => setActiveSector(k)}>{k}</button>
          )}
        </div>
        <div className="sector-content">
          <div>
            <h3 className="sector-headline" style={{ fontFamily: "Verdana" }}>{sectors[activeSector].headline}</h3>
            <p className="sector-desc">{sectors[activeSector].desc}</p>
            <div className="sector-stats">
              {sectors[activeSector].stats.map((s, i) =>
              <div key={i} className="sector-stat">
                  <div className="v">{s.v}</div>
                  <div className="l">{s.l}</div>
                </div>
              )}
            </div>
            <button className="btn-primary" style={{ marginTop: 28 }} onClick={() => document.getElementById('cta-final').scrollIntoView()}>
              Quiero estos clientes →
            </button>
          </div>
          <div className="sector-visual">
            <div className="search-bar-mock">
              <span>🔍</span>
              <span>{activeSector.replace(/^[^\s]+\s/, '')} cerca de mí</span>
            </div>
            <div className="search-result-mock">
              <div className="srm-g">● Tu negocio aquí <span className="srm-badge">TOP 1</span></div>
              <div className="srm-t">Tu {activeSector.replace(/^[^\s]+\s/, '')} · ⭐ 4.9 (127 reseñas)</div>
              <div className="srm-s">Abierto ahora · A 0.3 km · WhatsApp disponible</div>
            </div>
            <div className="sector-label-vis">
              {sectors[activeSector].stats[0].v} búsquedas/mes{'\n'}esperando encontrarte
            </div>
          </div>
        </div>
      </div>
    </section>

    {/* DIAGNOSIS */}
    <DiagnosisTool />

    {/* URGENCY */}
    <section className="urgency-section">
      <div className="section-inner">
        <div className="urgency-inner">
          <div>
            <div className="section-label" style={{ color: 'var(--orange)' }}>🚨 Oferta limitada</div>
            <h2 className="urgency-headline" style={{ fontFamily: "Verdana" }}>Solo <span className="orange">5 negocios</span> por zona<br />este mes</h2>
            <p className="urgency-sub">Para garantizar resultados, trabajamos con un número limitado de negocios por ciudad y giro. No saturamos zonas.</p>
            <div className="spots-row">
              {[...Array(5)].map((_, i) => (
                <div key={i} className={`spot ${i < 3 ? 'taken' : 'free'}`}></div>
              ))}
              <span className="spots-label"><strong style={{color:'var(--white)'}}>3 ocupados</strong> · <strong style={{color:'var(--lime)'}}>2 disponibles</strong></span>
            </div>
            <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
              <button className="btn-primary" onClick={() => document.getElementById('cta-final').scrollIntoView()}>
                Reservar mi lugar →
              </button>
            </div>
          </div>
          <div className="countdown-box">
            <div className="countdown-label">Promoción termina en</div>
            <div className="countdown-digits">
              {[
              { n: String(countdown.d).padStart(2, '0'), l: 'días' },
              { n: '03', l: 'horas' },
              { n: String(countdown.m).padStart(2, '0'), l: 'min' },
              { n: String(countdown.s).padStart(2, '0'), l: 'seg' }].
              map((u, i) =>
              <div key={i} className="countdown-unit">
                  <div className="countdown-num">{u.n}</div>
                  <div className="countdown-unit-label">{u.l}</div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </section>

    {/* FAQ */}
    <section className="faq-section" id="faq">
      <div className="section-inner">
        <div className="fade-up" style={{ textAlign: 'center' }}>
          <div className="section-label">Preguntas frecuentes</div>
          <h2 className="section-title" style={{ fontFamily: "Verdana" }}>Resolvemos tus dudas</h2>
        </div>
        <div className="faq-list">
          {faqs.map((f, i) => <FaqItem key={i} q={f.q} a={f.a} />)}
        </div>
      </div>
    </section>

    {/* FINAL CTA */}
    <section className="final-cta" id="cta-final">
      <div className="section-inner" style={{ position: 'relative', zIndex: 2 }}>
        <div className="cta-warning">⚠️ Cada día sin Google es dinero que pierdes</div>
        <h2 className="final-headline" style={{ fontFamily: "Georgia" }}>
          Si sigues sin aparecer en internet,<br />
          estás perdiendo clientes<br />
          <span className="highlight">todos los días</span>
        </h2>
        <p className="final-sub">El momento de actuar es ahora. Hay personas buscando exactamente lo que ofreces.</p>
        <div className="final-btns">
          <a href="https://wa.me/525665817161?text=Hola,%20quiero%20más%20información%20sobre%20generar%20clientes%20con%20Google" className="btn-wa">
            <span>💬</span> Escribir por WhatsApp
          </a>
          <button className="btn-call">
            <span>📞</span> Agendar llamada gratuita
          </button>
          <button className="btn-diag">
            <span>🔍</span> Diagnóstico GRATIS
          </button>
        </div>
        <div style={{ display: 'flex', gap: 32, justifyContent: 'center', flexWrap: 'wrap', opacity: 0.6, fontSize: '0.82rem', color: 'oklch(60% 0.01 265)' }}>
          <span>✓ Sin contratos de permanencia</span>
          <span>✓ Resultados medibles</span>
          <span>✓ Sin conocimientos técnicos</span>
          <span>✓ Garantía de resultados</span>
        </div>
      </div>
    </section>

    <footer>
      © 2025 <span>Marketingynegociosdigitales.com</span> · SEO Local & Páginas Web para Negocios · Todos los derechos reservados
    </footer>

    {/* CHATBOT */}
    <Chatbot />

    {/* TWEAKS */}
    {showTweaks &&
    <div className="tweaks-panel">
        <div className="tweaks-title" style={{ fontFamily: 'Verdana' }}>⚙️ Tweaks</div>
        <div className="tweak-row">
          <div className="tweak-label">Días de urgencia</div>
          <input type="range" className="tweak-range" min={1} max={30} value={tweaks.urgencyDays}
        onChange={(e) => updateTweak('urgencyDays', +e.target.value)} />
          <div style={{ textAlign: 'right', fontSize: '0.75rem', color: 'oklch(60% 0.01 265)', marginTop: 4 }}>{tweaks.urgencyDays} días</div>
        </div>
        <div className="tweak-row">
          <div className="tweak-label">Mostrar contador hero</div>
          <div className="tweak-toggle">
            <button className={`tweak-opt ${tweaks.showCounter ? 'active' : ''}`} onClick={() => updateTweak('showCounter', true)}>Sí</button>
            <button className={`tweak-opt ${!tweaks.showCounter ? 'active' : ''}`} onClick={() => updateTweak('showCounter', false)}>No</button>
          </div>
        </div>
        <div className="tweak-row">
          <div className="tweak-label">Estilo hero</div>
          <div className="tweak-toggle">
            <button className={`tweak-opt ${tweaks.heroStyle === 'dark' ? 'active' : ''}`} onClick={() => updateTweak('heroStyle', 'dark')}>Dark</button>
            <button className={`tweak-opt ${tweaks.heroStyle === 'warm' ? 'active' : ''}`} onClick={() => updateTweak('heroStyle', 'warm')}>Warm</button>
          </div>
        </div>
      </div>
    }
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
