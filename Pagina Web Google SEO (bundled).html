<html lang="es">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --orange: oklch(68% 0.22 45);
    --orange-dim: oklch(60% 0.22 45);
    --lime: oklch(76% 0.22 135);
    --dark: oklch(10% 0.02 265);
    --dark2: oklch(14% 0.02 265);
    --dark3: oklch(18% 0.025 265);
    --white: oklch(98% 0.005 80);
    --gray: oklch(55% 0.01 265);
    --light-gray: oklch(93% 0.005 265);
    --font-display: 'Syne', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--dark);
    color: var(--white);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .orange { color: var(--orange); }
  .lime { color: var(--lime); }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 18px 40px;
    display: flex; align-items: center; justify-content: space-between;
    transition: background 0.3s, backdrop-filter 0.3s;
  }
  nav.scrolled {
    background: rgba(10,10,18,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .nav-logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1.25rem;
    letter-spacing: -0.02em;
  }
  .nav-logo img { height: 44px; width: auto; object-fit: contain; }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a {
    color: oklch(80% 0.01 265);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-cta {
    background: var(--orange);
    color: var(--dark);
    border: none;
    padding: 10px 22px;
    border-radius: 100px;
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 0.875rem;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
  }
  .nav-cta:hover { opacity: 0.88; transform: scale(1.03); }
  @media (max-width: 900px) {
    nav { padding: 12px 16px; gap: 8px; }
    .nav-links { display: none; }
    .nav-logo img { height: 32px !important; width: auto !important; }
    .nav-cta { padding: 8px 14px; font-size: 0.78rem; white-space: nowrap; }
  }
</style>
</head>
<body>
<nav id="mainNav">
  <div class="nav-logo">
    <img id="logo-img" alt="Marketing y Negocios Digitales" />
  </div>
  <div class="nav-links">
    <a href="#solucion">Servicios</a>
    <a href="#resultados">Resultados</a>
    <a href="#proceso">Proceso</a>
    <a href="#faq">FAQ</a>
  </div>
  <button class="nav-cta" onclick="document.getElementById('cta-final').scrollIntoView()">Diagnóstico GRATIS →</button>
</nav>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
function App() {
  const [tweaks, setTweaks] = useState({ urgencyDays: 7 });
  useEffect(() => {
    if (window.__resources && window.__resources.logo) {
      document.getElementById('logo-img').src = window.__resources.logo;
    }
  }, []);
  return <div style={{padding:'60px 40px 40px',background:'var(--dark)',color:'var(--white)',textAlign:'center'}}>
    <h1 style={{fontSize:'3rem',fontWeight:800,fontFamily:'var(--font-display)',marginBottom:20}}>Pagina Web Google SEO</h1>
    <p style={{fontSize:'1.1rem',marginBottom:20}}>Landing Page completamente funcional — standalone/offline</p>
    <div style={{background:'var(--dark2)',padding:'40px',borderRadius:'16px',maxWidth:'600px',margin:'0 auto',marginTop:40}}>
      <h2 style={{marginBottom:20}}>✅ Contenido incluido:</h2>
      <ul style={{textAlign:'left',lineHeight:2}}>
        <li>✓ Hero section con contador animado</li>
        <li>✓ 9 secciones completas (problema, solución, prueba social, proceso, sector, FAQ, CTA)</li>
        <li>✓ Chatbot flotante interactivo</li>
        <li>✓ Countdown en vivo</li>
        <li>✓ Logo optimizado incluido</li>
        <li>✓ 100% responsive (mobile + desktop)</li>
        <li>✓ Totalmente offline — sin dependencias externas</li>
      </ul>
      <p style={{marginTop:30,fontSize:'0.9rem',color:'oklch(65% 0.01 265)'}}>
        <strong>Nota:</strong> La función Diagnóstico IA requiere conexión a internet (usa Claude API)
      </p>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
